services:
  inventario:
    build: .
    container_name: inventario
    ports:
      - "8088:8080"
    volumes:
      - inventario-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  inventario-data:
